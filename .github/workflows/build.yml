name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Generate App Icons
      run: |
        sudo apt-get install -y imagemagick
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        convert -size 48x48 xc:#2E7D32 app/src/main/res/mipmap-mdpi/ic_launcher.png
        convert -size 72x72 xc:#2E7D32 app/src/main/res/mipmap-hdpi/ic_launcher.png
        convert -size 96x96 xc:#2E7D32 app/src/main/res/mipmap-xhdpi/ic_launcher.png
        convert -size 144x144 xc:#2E7D32 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        convert -size 192x192 xc:#2E7D32 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SangsarHisab-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
