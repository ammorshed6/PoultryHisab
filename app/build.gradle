plugins {
    id 'com.android.application'
}

android {
    namespace 'com.poultryhisab.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.poultryhisab.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
